<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🃏 台灣國語女聲記分器</title>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont;
  background: #f4f7f6;
  padding: 20px;
}
.card {
  background: #fff;
  border-radius: 14px;
  padding: 20px;
  max-width: 520px;
  margin: auto;
  box-shadow: 0 8px 16px rgba(0,0,0,.1);
}
h2 { text-align: center; }
.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}
input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}
button {
  border: none;
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
}
.btn-add { background: #28a745; color: #fff; }
.btn-submit { background: #007bff; color: #fff; width: 100%; margin-top: 10px; }
.btn-reset { background: #dc3545; color: #fff; width: 100%; margin-top: 10px; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}
th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}
.positive { color: #28a745; font-weight: bold; }
.negative { color: #dc3545; font-weight: bold; }
.score-input { width: 70px; }
</style>
</head>

<body>
<div class="card">
  <h2>🃏 扑克找朋友 · 带郑师傅自由的飞</h2>

  <div class="input-group">
    <input id="playerName" placeholder="輸入玩家名字…">
    <button class="btn-add" onclick="addPlayer()">新增</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>玩家</th>
        <th>總分</th>
        <th>本局</th>
      </tr>
    </thead>
    <tbody id="playerBody"></tbody>
  </table>

  <button class="btn-submit" onclick="updateScores()">提交本局得分</button>
  <button class="btn-reset" onclick="resetGame()">清空重置</button>
</div>

<script>
let players = JSON.parse(localStorage.getItem('pokerPlayers')) || [];

/* 🎤 台灣國語【女聲 ONLY】 */
function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  const voices = speechSynthesis.getVoices();

  // ✅ 只允许台湾国语女声
  const femaleTW = voices.find(v =>
    v.lang === 'zh-TW' && /女|female/i.test(v.name)
  );

  // 没有台湾女声就直接静音（避免男声）
  if (!femaleTW) return;

  u.voice = femaleTW;

  // 台湾国语：柔一点、自然一点
  u.rate  = 0.8 + Math.random() * 0.05;
  u.pitch = 1.1 + Math.random() * 0.05;

  speechSynthesis.speak(u);
}
speechSynthesis.onvoiceschanged = () => {};

/* 郑师傅语音包（台湾口语） */
const zhengGood = [
  "欸，不錯喔鄭師傅",
  "可以啦，這把打得很好",
  "鄭師傅，滿厲害的耶"
];

const zhengBad = [
  "欸？這把沒分耶",
  "鄭師傅，這樣不行喔",
  "唉唷，又芭比Q了啦"
];

/* 渲染 */
function render() {
  const tbody = document.getElementById('playerBody');
  tbody.innerHTML = '';
  players.forEach((p, i) => {
    tbody.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td class="${p.score >= 0 ? 'positive' : 'negative'}">${p.score}</td>
        <td><input type="number" class="score-input" id="input-${i}" placeholder="0"></td>
      </tr>
    `;
  });
  localStorage.setItem('pokerPlayers', JSON.stringify(players));
}

/* 添加玩家 */
function addPlayer() {
  const name = playerName.value.trim();
  if (!name) return;
  players.push({ name, score: 0, fail: 0 });
  playerName.value = '';
  render();
}

/* ✅ 核心逻辑 */
function updateScores() {
  players.forEach((p, i) => {
    const val = parseInt(document.getElementById(`input-${i}`).value) || 0;
    const isZheng = /zheng|郑|鄭/i.test(p.name);

    if (isZheng) {
      if (val > 0) {
        p.fail = 0;
        speak(zhengGood[Math.floor(Math.random() * zhengGood.length)]);
      } else {
        p.fail++;
        let msg = zhengBad[Math.floor(Math.random() * zhengBad.length)];
        if (p.fail >= 3) msg += "，真的母湯啦";
        speak(msg);
      }
    } else {
      // ✅ 其他人：只有加分才有声音
      if (val > 0) {
        speak(p.name + "，可以喔");
      }
    }

    p.score += val;
    document.getElementById(`input-${i}`).value = '';
  });
  render();
}

/* 重置 */
function resetGame() {
  if (confirm("確定要清空嗎？")) {
    players = [];
    render();
  }
}
render();
</script>
</body>
</html>
