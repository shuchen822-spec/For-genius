<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🃏 扑克记分器</title>

<style>
body {
  font-family: system-ui, -apple-system;
  background: #f4f7f6;
  padding: 20px;
}
.card {
  background: #fff;
  border-radius: 14px;
  padding: 20px;
  max-width: 520px;
  margin: auto;
  box-shadow: 0 8px 16px rgba(0,0,0,.1);
}
h2 { text-align: center; }
.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}
input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}
button {
  border: none;
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
}
.btn-add { background: #28a745; color: #fff; }
.btn-submit { background: #007bff; color: #fff; width: 100%; margin-top: 10px; }
.btn-reset { background: #dc3545; color: #fff; width: 100%; margin-top: 10px; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}
th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}
.positive { color: #28a745; font-weight: bold; }
.negative { color: #dc3545; font-weight: bold; }
.score-input { width: 70px; }
</style>
</head>

<body>
<div class="card">
  <h2>🃏 扑克找朋友 · 带郑师傅自由的飞</h2>

  <div class="input-group">
    <input id="playerName" placeholder="输入玩家名字…">
    <button class="btn-add" onclick="addPlayer()">添加</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>玩家</th>
        <th>总分</th>
        <th>本局</th>
      </tr>
    </thead>
    <tbody id="playerBody"></tbody>
  </table>

  <button class="btn-submit" onclick="updateScores()">提交本局得分</button>
  <button class="btn-reset" onclick="resetGame()">清空重置</button>
</div>

<script>
let players = JSON.parse(localStorage.getItem('pokerPlayers')) || [];

/* 🎤 广西话模拟（最稳） */
function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  const voices = speechSynthesis.getVoices();
  const zh = voices.find(v => v.lang.startsWith('zh'));
  if (zh) u.voice = zh;

  // 广西味：慢一点，高一点
  u.rate  = 0.75;
  u.pitch = 1.35;

  speechSynthesis.speak(u);
}
speechSynthesis.onvoiceschanged = () => {};

/* 渲染 */
function render() {
  const tbody = document.getElementById('playerBody');
  tbody.innerHTML = '';
  players.forEach((p, i) => {
    tbody.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td class="${p.score >= 0 ? 'positive' : 'negative'}">${p.score}</td>
        <td><input type="number" class="score-input" id="input-${i}" placeholder="0"></td>
      </tr>
    `;
  });
  localStorage.setItem('pokerPlayers', JSON.stringify(players));
}

/* 添加玩家 */
function addPlayer() {
  const name = playerName.value.trim();
  if (!name) return;
  players.push({ name, score: 0 });
  playerName.value = '';
  render();
}

/* ✅ 核心逻辑 + 头名播报 */
function updateScores() {
  players.forEach((p, i) => {
    const val = parseInt(document.getElementById(`input-${i}`).value) || 0;
    const isZheng = /zheng|郑|鄭/i.test(p.name);

    if (isZheng) {
      if (val > 0) {
        speak("郑师傅，你好棒哦");
      } else {
        speak("郑师傅，你芭比Q..啦..啦..啦");
      }
    } else {
      // 其他人：只有加分才有声音
      if (val > 0) {
        speak(p.name + "，可以哦");
      }
    }

    p.score += val;
    document.getElementById(`input-${i}`).value = '';
  });

  // 🏆 头名播报（支持并列）
  if (players.length > 0) {
    const maxScore = Math.max(...players.map(p => p.score));
    const leaders = players.filter(p => p.score === maxScore);

    if (leaders.length === 1) {
      speak("现在第一名是 " + leaders[0].name);
    } else if (leaders.length > 1) {
      const names = leaders.map(p => p.name).join(" 和 ");
      speak("现在并列第一的是 " + names);
    }
  }

  render();
}

/* 重置 */
function resetGame() {
  if (confirm("确定清空？")) {
    players = [];
    render();
  }
}
render();
</script>
</body>
</html>
