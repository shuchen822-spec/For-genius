<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🃏 郑师傅牌桌记分器</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
      background: #f4f7f6;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      max-width: 520px;
      margin: auto;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-add { background: #28a745; color: #fff; }
    .btn-submit { background: #007bff; color: #fff; width: 100%; margin-top: 10px; }
    .btn-reset { background: #dc3545; color: #fff; width: 100%; margin-top: 10px; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }
    .positive { color: #28a745; font-weight: bold; }
    .negative { color: #dc3545; font-weight: bold; }
    .score-input { width: 70px; }
  </style>
</head>

<body>
  <div class="card">
    <h2>🃏 扑克找朋友 · 郑师傅专用记分器</h2>

    <div class="input-group">
      <input id="playerName" placeholder="输入玩家名字…" />
      <button class="btn-add" onclick="addPlayer()">添加</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>玩家</th>
          <th>总分</th>
          <th>本局</th>
        </tr>
      </thead>
      <tbody id="playerBody"></tbody>
    </table>

    <button class="btn-submit" onclick="updateScores()">提交本局得分</button>
    <button class="btn-reset" onclick="resetGame()">清空重置</button>
  </div>

<script>
let players = JSON.parse(localStorage.getItem('pokerPlayers')) || [];

/* 🎤 广西味语音 */
function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  const voices = speechSynthesis.getVoices();
  const zhVoice =
    voices.find(v => v.lang.includes('zh') && /女|female/i.test(v.name)) ||
    voices.find(v => v.lang.includes('zh'));
  if (zhVoice) u.voice = zhVoice;
  u.rate = 0.78;
  u.pitch = 1.25;
  speechSynthesis.speak(u);
}
speechSynthesis.onvoiceschanged = () => {};

/* 🔔 锣 */
function gong() {
  const ctx = new AudioContext();
  const o = ctx.createOscillator();
  o.type = 'triangle';
  o.frequency.setValueAtTime(600, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.5);
  o.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime + 0.5);
}

/* 💥 爆炸 */
function boom() {
  const ctx = new AudioContext();
  const o = ctx.createOscillator();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(90, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.4);
  o.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime + 0.4);
}

/* 渲染 */
function render() {
  const tbody = document.getElementById('playerBody');
  tbody.innerHTML = '';
  players.forEach((p, i) => {
    tbody.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td class="${p.score >= 0 ? 'positive' : 'negative'}">${p.score}</td>
        <td><input type="number" class="score-input" id="input-${i}" placeholder="0"></td>
      </tr>
    `;
  });
  localStorage.setItem('pokerPlayers', JSON.stringify(players));
}

/* 添加玩家 */
function addPlayer() {
  const name = playerName.value.trim();
  if (!name) return;
  players.push({ name, score: 0, fail: 0 });
  playerName.value = '';
  render();
}

/* ✅ 核心逻辑 */
function updateScores() {
  players.forEach((p, i) => {
    const val = parseInt(document.getElementById(`input-${i}`).value) || 0;
    const isZheng = /zheng|郑/i.test(p.name);

    if (isZheng) {
      if (val > 0) {
        p.fail = 0;
        gong();
        speak("郑师傅，你好棒哦");
      } else {
        p.fail++;
        boom();
        if (p.fail === 1) {
          speak("郑师傅，你芭比Q啦，啦啦啦");
        } else if (p.fail === 2) {
          speak("哎哟郑师傅，又芭比Q咯");
        } else {
          speak("郑师傅你在搞莫子哦？芭比Q啦啦啦啦！");
        }
      }
    } else {
      if (val > 0) {
        gong();
        speak(p.name + "你好棒哦");
      } else if (val < 0) {
        boom();
        speak(p.name + "芭比Q啦");
      }
    }

    p.score += val;
    document.getElementById(`input-${i}`).value = '';
  });

  if (players.length) {
    const top = players.reduce((a, b) => a.score > b.score ? a : b);
    speak("现在第一名是" + top.name);
  }
  render();
}

/* 重置 */
function resetGame() {
  if (confirm("确定清空所有数据？")) {
    players = [];
    render();
  }
}
render();
</script>
</body>
</html>
