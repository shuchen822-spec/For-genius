<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🃏 粤语声普通话记分器</title>

<style>
body {
  font-family: system-ui, -apple-system;
  background: #f4f7f6;
  padding: 20px;
}
.card {
  background: #fff;
  border-radius: 14px;
  padding: 20px;
  max-width: 520px;
  margin: auto;
  box-shadow: 0 8px 16px rgba(0,0,0,.1);
}
h2 { text-align: center; }
.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}
input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}
button {
  border: none;
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
}
.btn-add { background: #28a745; color: #fff; }
.btn-submit { background: #007bff; color: #fff; width: 100%; margin-top: 10px; }
.btn-reset { background: #dc3545; color: #fff; width: 100%; margin-top: 10px; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}
th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}
.positive { color: #28a745; font-weight: bold; }
.negative { color: #dc3545; font-weight: bold; }
.score-input { width: 70px; }
</style>
</head>

<body>
<div class="card">
  <h2>🃏 扑克找朋友 · 粤语声普通话</h2>

  <div class="input-group">
    <input id="playerName" placeholder="输入玩家名字…">
    <button class="btn-add" onclick="addPlayer()">添加</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>玩家</th>
        <th>总分</th>
        <th>本局</th>
      </tr>
    </thead>
    <tbody id="playerBody"></tbody>
  </table>

  <button class="btn-submit" onclick="updateScores()">提交本局得分</button>
  <button class="btn-reset" onclick="resetGame()">清空重置</button>
</div>

<script>
let players = JSON.parse(localStorage.getItem('pokerPlayers')) || [];

/* 🎤 粤语声线（读普通话） */
function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  const voices = speechSynthesis.getVoices();

  // ✅ 优先：粤语女声（广东口音）
  let voice = voices.find(v =>
    v.lang === 'zh-HK' && /女|female/i.test(v.name)
  );

  // ✅ 兜底：普通话女声
  if (!voice) {
    voice = voices.find(v =>
      v.lang.startsWith('zh') && /女|female/i.test(v.name)
    );
  }

  if (!voice) return;

  u.voice = voice;

  // 广东普通话感觉：稍慢 + 稍低
  u.rate  = 0.85 + Math.random() * 0.05;
  u.pitch = 1.0 + Math.random() * 0.05;

  speechSynthesis.speak(u);
}
speechSynthesis.onvoiceschanged = () => {};

/* 郑师傅语音包（普通话词，粤味读） */
const zhengGood = [
  "哎，可以啊郑师傅",
  "不错不错，这把打得好",
  "郑师傅，你这手可以"
];
const zhengBad = [
  "哎哟，这把没分啊",
  "郑师傅，这样不行哦",
  "又芭比Q了啊"
];

/* 渲染 */
function render() {
  const tbody = document.getElementById('playerBody');
  tbody.innerHTML = '';
  players.forEach((p, i) => {
    tbody.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td class="${p.score >= 0 ? 'positive' : 'negative'}">${p.score}</td>
        <td><input type="number" class="score-input" id="input-${i}" placeholder="0"></td>
      </tr>
    `;
  });
  localStorage.setItem('pokerPlayers', JSON.stringify(players));
}

/* 添加玩家 */
function addPlayer() {
  const name = playerName.value.trim();
  if (!name) return;
  players.push({ name, score: 0, fail: 0 });
  playerName.value = '';
  render();
}

/* ✅ 核心逻辑 */
function updateScores() {
  players.forEach((p, i) => {
    const val = parseInt(document.getElementById(`input-${i}`).value) || 0;
    const isZheng = /zheng|郑|鄭/i.test(p.name);

    if (isZheng) {
      if (val > 0) {
        p.fail = 0;
        speak(zhengGood[Math.floor(Math.random() * zhengGood.length)]);
      } else {
        p.fail++;
        let msg = zhengBad[Math.floor(Math.random() * zhengBad.length)];
        if (p.fail >= 3) msg += "，真的不太行了";
        speak(msg);
      }
    } else {
      // ✅ 其他人：只有加分才有声音
      if (val > 0) {
        speak(p.name + "，可以啊");
      }
    }

    p.score += val;
    document.getElementById(`input-${i}`).value = '';
  });
  render();
}

/* 重置 */
function resetGame() {
  if (confirm("确定清空？")) {
    players = [];
    render();
  }
}
render();
</script>
</body>
</html>
