<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🃏 郑师傅自然语音记分器</title>
<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont;
  background: #f4f7f6;
  padding: 20px;
}
.card {
  background: #fff;
  border-radius: 14px;
  padding: 20px;
  max-width: 520px;
  margin: auto;
  box-shadow: 0 8px 16px rgba(0,0,0,.1);
}
h2 { text-align: center; }
.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}
input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}
button {
  border: none;
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
}
.btn-add { background: #28a745; color: #fff; }
.btn-submit { background: #007bff; color: #fff; width: 100%; margin-top: 10px; }
.btn-reset { background: #dc3545; color: #fff; width: 100%; margin-top: 10px; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}
th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}
.positive { color: #28a745; font-weight: bold; }
.negative { color: #dc3545; font-weight: bold; }
.score-input { width: 70px; }
</style>
</head>

<body>
<div class="card">
  <h2>🃏 扑克找朋友 · 带郑师傅自由的飞</h2>

  <div class="input-group">
    <input id="playerName" placeholder="输入玩家名字…">
    <button class="btn-add" onclick="addPlayer()">添加</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>玩家</th>
        <th>总分</th>
        <th>本局</th>
      </tr>
    </thead>
    <tbody id="playerBody"></tbody>
  </table>

  <button class="btn-submit" onclick="updateScores()">提交本局得分</button>
  <button class="btn-reset" onclick="resetGame()">清空重置</button>
</div>

<script>
let players = JSON.parse(localStorage.getItem('pokerPlayers')) || [];

/* 🎤 自然语音 */
function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  const voices = speechSynthesis.getVoices();
  const zh =
    voices.find(v => v.lang.includes('zh') && /女|female/i.test(v.name)) ||
    voices.find(v => v.lang.includes('zh'));
  if (zh) u.voice = zh;
  u.rate = 0.75 + Math.random() * 0.1;
  u.pitch = 1.15 + Math.random() * 0.1;
  speechSynthesis.speak(u);
}
speechSynthesis.onvoiceschanged = () => {};

/* 🔔 锣 */
function gong() {
  const ctx = new AudioContext();
  const o = ctx.createOscillator();
  o.type = 'triangle';
  o.frequency.setValueAtTime(600, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.4);
  o.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime + 0.4);
}

/* 💥 爆 */
function boom() {
  const ctx = new AudioContext();
  const o = ctx.createOscillator();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(90, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.3);
  o.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime + 0.3);
}

/* 郑师傅语音包 */
const zhengGood = [
  "哎，可以啊郑师傅",
  "不错咯，这把打得好",
  "郑师傅，你这手可以哦"
];
const zhengBad = [
  "哎哟，郑师傅芭比Q啦",
  "诶？这把又没分咯",
  "郑师傅你在搞莫子哦"
];

/* 渲染 */
function render() {
  const tbody = document.getElementById('playerBody');
  tbody.innerHTML = '';
  players.forEach((p, i) => {
    tbody.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td class="${p.score >= 0 ? 'positive' : 'negative'}">${p.score}</td>
        <td><input type="number" id="input-${i}" class="score-input" placeholder="0"></td>
      </tr>
    `;
  });
  localStorage.setItem('pokerPlayers', JSON.stringify(players));
}

/* 添加 */
function addPlayer() {
  const name = playerName.value.trim();
  if (!name) return;
  players.push({ name, score: 0, fail: 0 });
  playerName.value = '';
  render();
}

/* ✅ 核心逻辑 */
function updateScores() {
  players.forEach((p, i) => {
    const val = parseInt(document.getElementById(`input-${i}`).value) || 0;
    const isZheng = /zheng|郑/i.test(p.name);

    if (isZheng) {
      if (val > 0) {
        p.fail = 0;
        gong();
        speak(zhengGood[Math.floor(Math.random()*zhengGood.length)]);
      } else {
        p.fail++;
        boom();
        let msg = zhengBad[Math.floor(Math.random()*zhengBad.length)];
        if (p.fail >= 3) msg += "，啦啦啦";
        speak(msg);
      }
    } else {
      if (val > 0) {
        gong();
        speak(p.name + "，可以哦");
      }
      // 其他人 val <= 0 完全静音 ✅
    }

    p.score += val;
    document.getElementById(`input-${i}`).value = '';
  });
  render();
}

/* 重置 */
function resetGame() {
  if (confirm("确定清空？")) {
    players = [];
    render();
  }
}
render();
</script>
</body>
</html>
``
